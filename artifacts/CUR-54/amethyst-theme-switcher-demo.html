<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CUR-54 Amethyst theme switcher artifact</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #111217;
        color: #ccccdc;
        transition: background 240ms ease, color 240ms ease;
      }

      body.amethyst {
        background: #171124;
        color: #F2ECFF;
      }

      .page {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 24px;
        padding: 32px;
      }

      .drawer,
      .panel {
        border: 1px solid rgba(204, 204, 220, 0.16);
        border-radius: 10px;
        background: #181b1f;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        overflow: hidden;
      }

      body.amethyst .drawer,
      body.amethyst .panel {
        border-color: #44335F;
        background: #211735;
      }

      .header {
        padding: 20px 24px;
        border-bottom: 1px solid rgba(204, 204, 220, 0.16);
      }

      body.amethyst .header {
        border-color: #33264C;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 20px;
      }

      p {
        margin-top: 8px;
        color: rgba(204, 204, 220, 0.72);
      }

      body.amethyst p {
        color: #CBB8F2;
      }

      .theme-grid {
        display: grid;
        gap: 12px;
        padding: 20px;
      }

      .theme-card {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 12px;
        min-height: 56px;
        border: 1px solid rgba(204, 204, 220, 0.12);
        border-radius: 8px;
        background: rgba(204, 204, 220, 0.04);
        color: inherit;
        cursor: pointer;
        font: inherit;
        padding: 0 14px;
        text-align: left;
      }

      .theme-card:hover,
      .theme-card.selected {
        border-color: #B794F4;
      }

      .dot {
        width: 16px;
        height: 16px;
        border: 2px solid currentColor;
        border-radius: 50%;
      }

      .selected .dot {
        box-shadow: inset 0 0 0 3px #211735;
        background: #B794F4;
      }

      .badge {
        border-radius: 999px;
        background: rgba(183, 148, 244, 0.18);
        color: #F2ECFF;
        font-size: 12px;
        padding: 3px 8px;
      }

      .preview {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        padding: 24px;
      }

      .metric {
        min-height: 150px;
        border: 1px solid #33264C;
        border-radius: 10px;
        background: #2B2043;
        padding: 18px;
      }

      .metric strong {
        color: #D7B8FF;
        display: block;
        font-size: 44px;
        margin-top: 24px;
      }

      .button {
        display: inline-block;
        margin-top: 24px;
        border-radius: 6px;
        background: #B794F4;
        color: #171124;
        font-weight: 700;
        padding: 10px 16px;
      }

      .gradient {
        height: 16px;
        margin-top: 24px;
        border-radius: 999px;
        background: linear-gradient(270deg, #B794F4 0%, #7F5AF0 100%);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="drawer" aria-label="Change theme drawer">
        <div class="header">
          <h1>Change theme</h1>
          <p>Experimental themes include the new purple/amethyst option.</p>
        </div>
        <div class="theme-grid" role="radiogroup" aria-label="Interface theme">
          <button class="theme-card" role="radio" aria-checked="false">
                <span class="dot"></span><span>System preference</span><span></span>
              </button><button class="theme-card" role="radio" aria-checked="false">
                <span class="dot"></span><span>Dark</span><span></span>
              </button><button class="theme-card" role="radio" aria-checked="false">
                <span class="dot"></span><span>Light</span><span></span>
              </button>
          <button class="theme-card amethyst-option" role="radio" aria-checked="false">
                <span class="dot"></span><span>Amethyst</span><span class="badge">Experimental</span>
              </button><button class="theme-card" role="radio" aria-checked="false">
                <span class="dot"></span><span>Desert bloom</span><span class="badge">Experimental</span>
              </button><button class="theme-card" role="radio" aria-checked="false">
                <span class="dot"></span><span>Gilded grove</span><span class="badge">Experimental</span>
              </button><button class="theme-card" role="radio" aria-checked="false">
                <span class="dot"></span><span>Sapphire dusk</span><span class="badge">Experimental</span>
              </button><button class="theme-card" role="radio" aria-checked="false">
                <span class="dot"></span><span>Tron</span><span class="badge">Experimental</span>
              </button><button class="theme-card" role="radio" aria-checked="false">
                <span class="dot"></span><span>Gloom</span><span class="badge">Experimental</span>
              </button>
        </div>
      </section>
      <section class="panel" aria-label="Amethyst theme preview">
        <div class="header">
          <h2>Amethyst theme preview</h2>
          <p>The selected theme applies deep violet surfaces with amethyst accents.</p>
        </div>
        <div class="preview">
          <div class="metric">
            Active users
            <strong>12.4k</strong>
            <div class="gradient"></div>
          </div>
          <div class="metric">
            Query success
            <strong>99.9%</strong>
            <span class="button">Primary action</span>
          </div>
        </div>
      </section>
    </main>
    <script>
      const cards = Array.from(document.querySelectorAll('.theme-card'));
      const amethyst = document.querySelector('.amethyst-option');
      const select = (card) => {
        cards.forEach((item) => {
          item.classList.remove('selected');
          item.setAttribute('aria-checked', 'false');
        });
        card.classList.add('selected');
        card.setAttribute('aria-checked', 'true');
        document.body.classList.toggle('amethyst', card === amethyst);
      };
      cards.forEach((card) => card.addEventListener('click', () => select(card)));
    </script>
  </body>
</html>
