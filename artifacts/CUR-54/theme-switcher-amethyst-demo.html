<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CUR-54 Amethyst theme switcher demo</title>
    <style>
      :root {
        --canvas: #120a1f;
        --primary: #1a102b;
        --secondary: #24163a;
        --elevated: #2c1b46;
        --text: #f4eeff;
        --muted: rgba(244, 238, 255, 0.78);
        --accent: #9d6cff;
        --accent-soft: #c2a1ff;
        --border: rgba(194, 161, 255, 0.24);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 20% 10%, rgba(157, 108, 255, 0.32), transparent 34%),
          radial-gradient(circle at 80% 20%, rgba(194, 161, 255, 0.20), transparent 28%),
          var(--canvas);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 48px;
      }

      main {
        margin: 0 auto;
        max-width: 1180px;
      }

      .eyebrow {
        color: var(--accent-soft);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.12em;
        margin-bottom: 10px;
        text-transform: uppercase;
      }

      h1 {
        font-size: 44px;
        line-height: 1.1;
        margin: 0;
      }

      .subtitle {
        color: var(--muted);
        font-size: 18px;
        margin: 14px 0 36px;
      }

      .drawer {
        background: rgba(26, 16, 43, 0.92);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        padding: 24px;
      }

      .drawer-header {
        align-items: center;
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
      }

      .drawer-title {
        font-size: 24px;
        font-weight: 700;
      }

      .pill {
        background: rgba(157, 108, 255, 0.18);
        border: 1px solid rgba(194, 161, 255, 0.40);
        border-radius: 999px;
        color: var(--accent-soft);
        font-size: 13px;
        font-weight: 700;
        padding: 7px 12px;
      }

      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .card {
        background: #20182c;
        border: 1px solid rgba(244, 238, 255, 0.14);
        border-radius: 12px;
        cursor: pointer;
        min-height: 240px;
        overflow: hidden;
        transition:
          border 180ms ease,
          box-shadow 180ms ease,
          transform 180ms ease;
      }

      .card:hover,
      .card.selected {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(157, 108, 255, 0.5), 0 16px 36px rgba(18, 10, 31, 0.4);
        transform: translateY(-2px);
      }

      .card-header {
        align-items: center;
        border-bottom: 1px solid rgba(244, 238, 255, 0.12);
        display: flex;
        justify-content: space-between;
        padding: 12px;
      }

      .radio {
        align-items: center;
        display: flex;
        font-weight: 700;
        gap: 9px;
      }

      .dot {
        border: 2px solid rgba(244, 238, 255, 0.58);
        border-radius: 50%;
        height: 16px;
        position: relative;
        width: 16px;
      }

      .selected .dot {
        border-color: var(--accent-soft);
      }

      .selected .dot::after {
        background: var(--accent);
        border-radius: 50%;
        content: "";
        inset: 3px;
        position: absolute;
      }

      .badge {
        background: rgba(157, 108, 255, 0.18);
        border: 1px solid rgba(194, 161, 255, 0.35);
        border-radius: 999px;
        color: var(--accent-soft);
        font-size: 11px;
        font-weight: 700;
        padding: 4px 8px;
      }

      .preview {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      .preview-canvas {
        border-radius: 9px;
        height: 74px;
        padding: 12px;
      }

      .bar {
        border-radius: 999px;
        height: 10px;
        margin-bottom: 10px;
      }

      .bar.short {
        width: 60%;
      }

      .metric-row {
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr 1fr;
      }

      .metric {
        border-radius: 8px;
        height: 52px;
        padding: 10px;
      }

      .dark {
        --card-canvas: #111217;
        --card-primary: #1f2128;
        --card-secondary: #2d3038;
        --card-accent: #f05a28;
      }

      .light {
        --card-canvas: #f7f8fa;
        --card-primary: #ffffff;
        --card-secondary: #e9edf2;
        --card-accent: #f05a28;
        color: #1f2328;
      }

      .system {
        --card-canvas: #10141c;
        --card-primary: #f7f8fa;
        --card-secondary: #293241;
        --card-accent: #6da9ff;
      }

      .amethyst {
        --card-canvas: var(--canvas);
        --card-primary: var(--primary);
        --card-secondary: var(--secondary);
        --card-accent: var(--accent);
      }

      .preview-canvas {
        background: var(--card-canvas);
      }

      .metric {
        background: var(--card-primary);
      }

      .bar {
        background: var(--card-accent);
      }

      .bar.short,
      .metric:nth-child(2) {
        background: var(--card-secondary);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Jira CUR-54</div>
      <h1>Purple/amethyst theme in the Grafana theme switcher</h1>
      <p class="subtitle">
        The new Amethyst option is visible by default alongside the built-in theme choices.
      </p>

      <section class="drawer" aria-label="Change theme">
        <div class="drawer-header">
          <div class="drawer-title">Change theme</div>
          <div class="pill">Amethyst palette registered</div>
        </div>

        <div class="grid" role="radiogroup">
          <article class="card dark" data-theme="dark">
            <div class="card-header">
              <div class="radio"><span class="dot"></span>Dark</div>
            </div>
            <div class="preview">
              <div class="preview-canvas"><div class="bar"></div><div class="bar short"></div></div>
              <div class="metric-row"><div class="metric"></div><div class="metric"></div></div>
            </div>
          </article>

          <article class="card light" data-theme="light">
            <div class="card-header">
              <div class="radio"><span class="dot"></span>Light</div>
            </div>
            <div class="preview">
              <div class="preview-canvas"><div class="bar"></div><div class="bar short"></div></div>
              <div class="metric-row"><div class="metric"></div><div class="metric"></div></div>
            </div>
          </article>

          <article class="card system" data-theme="system">
            <div class="card-header">
              <div class="radio"><span class="dot"></span>System preference</div>
            </div>
            <div class="preview">
              <div class="preview-canvas"><div class="bar"></div><div class="bar short"></div></div>
              <div class="metric-row"><div class="metric"></div><div class="metric"></div></div>
            </div>
          </article>

          <article class="card amethyst selected" data-theme="amethyst">
            <div class="card-header">
              <div class="radio"><span class="dot"></span>Amethyst</div>
              <div class="badge">Experimental</div>
            </div>
            <div class="preview">
              <div class="preview-canvas"><div class="bar"></div><div class="bar short"></div></div>
              <div class="metric-row"><div class="metric"></div><div class="metric"></div></div>
            </div>
          </article>
        </div>
      </section>
    </main>

    <script>
      document.querySelectorAll(".card").forEach((card) => {
        card.addEventListener("click", () => {
          document.querySelectorAll(".card").forEach((item) => item.classList.remove("selected"));
          card.classList.add("selected");
        });
      });
    </script>
  </body>
</html>
