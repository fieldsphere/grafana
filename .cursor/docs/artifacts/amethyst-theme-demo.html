<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grafana Theme Selector - Amethyst</title>
    <style>
      :root {
        --bg: #111217;
        --card: #1b1f2a;
        --border: #2c3342;
        --text: #e7e9ee;
        --muted: #a6aec1;
        --amethyst-main: #b285ff;
        --amethyst-bg: #21182e;
      }

      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: radial-gradient(circle at top right, #252a37, var(--bg));
        color: var(--text);
      }

      .frame {
        max-width: 1080px;
        margin: 40px auto;
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #151923;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        background: var(--card);
      }

      .card .header {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 1px solid #79839b;
      }

      .selected .dot {
        border-color: var(--amethyst-main);
        box-shadow: inset 0 0 0 4px var(--amethyst-main);
      }

      .swatch {
        height: 140px;
        display: grid;
        place-items: center;
        color: #fff;
        font-weight: 600;
      }

      .dark {
        background: linear-gradient(120deg, #1f2737, #2b3446);
      }
      .light {
        color: #2d3445;
        background: linear-gradient(120deg, #f1f3f8, #dfe5ef);
      }
      .amethyst {
        background: linear-gradient(120deg, var(--amethyst-bg), #3a2e4e);
      }

      .selected {
        border-color: var(--amethyst-main);
        box-shadow: 0 0 0 2px rgba(178, 133, 255, 0.2);
      }
      .card {
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .footer {
        margin-top: 16px;
        color: var(--muted);
        font-size: 14px;
      }
      code {
        color: #e1ccff;
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <h1>Change theme</h1>
      <p>Theme switcher now includes a new experimental <strong>Amethyst</strong> option.</p>
      <section class="grid">
        <article class="card" data-theme-id="dark">
          <div class="header"><span class="dot"></span>Dark</div>
          <div class="swatch dark">Dark</div>
        </article>
        <article class="card" data-theme-id="light">
          <div class="header"><span class="dot"></span>Light</div>
          <div class="swatch light">Light</div>
        </article>
        <article class="card selected" data-theme-id="amethyst">
          <div class="header"><span class="dot"></span>Amethyst</div>
          <div class="swatch amethyst">Amethyst</div>
        </article>
      </section>
      <div class="footer">Selected theme id: <code id="selected-theme-id">amethyst</code></div>
    </main>
    <script>
      const cards = Array.from(document.querySelectorAll('.card'));
      const selectedThemeIdEl = document.getElementById('selected-theme-id');

      cards.forEach((card) => {
        card.addEventListener('click', () => {
          cards.forEach((otherCard) => otherCard.classList.remove('selected'));
          card.classList.add('selected');
          selectedThemeIdEl.textContent = card.dataset.themeId ?? 'unknown';
        });
      });
    </script>
  </body>
</html>
